<!DOCTYPE html>
<html>
<head>
    <title>TravelEase Login</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f0f8ff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            width:300px;
        }

        h2{
            text-align:center;
            color:#0077b6;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#0077b6;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#005f8a;
        }

        p{
            text-align:center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>TravelEase</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>

<script>
function login() {
    window.location.href = "home.html";
}
</script>
    <p>Don't have an account? Sign Up</p>
</div>

</body>
</html>
